<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ป้อนข้าวน้องแมวจร วัดคงคา | โครงการระดมทุนช่วยค่าอาหารแมว</title>
  
  <!-- Cute Cat Tab Icon (Favicon) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐱</text></svg>">
  
  <!-- Google Fonts: Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- React & Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React Code (Babel) -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Cozy Custom SVGs and Icons ---
    const SunIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
      </svg>
    );

    const MoonIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
      </svg>
    );

    // Paw Print Icon
    const PawIcon = ({ className, style }) => (
      <svg className={className} style={style} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="5" r="2" />
        <circle cx="8" cy="7" r="2" />
        <circle cx="16" cy="7" r="2" />
        <circle cx="5" cy="11" r="2" />
        <circle cx="19" cy="11" r="2" />
        <path d="M12 11c-2.5 0-4.5 2-4.5 4.5 0 2 1.5 3.5 3.5 4h2c2-.5 3.5-2 3.5-4 0-2.5-2-4.5-4.5-4.5Z" />
      </svg>
    );

    // Cat Face Icon
    const CatFaceIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color: 'var(--color-accent)'}}>
        <path d="M12 5c.67 0 1.35.09 2 .26L18.5 2 20 7.5c1.22 1.42 2 3.25 2 5.5 0 4.97-4.03 9-9 9s-9-4.03-9-9c0-2.25.78-4.08 2-5.5L7.5 2 10 5.26c.65-.17 1.33-.26 2-.26Z" />
        <path d="M9 14h.01M15 14h.01" />
        <path d="M10 17.5c1 1 3 1 4 0" />
      </svg>
    );

    // Fish Icon (represented by a stylized fish bone)
    const FishIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 7c-.5.5-1 1-1.5 1.5C15 7.5 13 7 11 7c-4 0-8 3-8 7 0 1.5.5 3 1.5 4C6 19 8.5 20 11 20c4 0 8-3 8-7 0-1-.5-2-1-3L21 7v-1l-3 1.5Z" />
        <line x1="8" y1="11" x2="8" y2="16" />
        <line x1="12" y1="10" x2="12" y2="17" />
        <line x1="16" y1="11" x2="16" y2="15" />
      </svg>
    );

    const BowlIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 11c0 5 4 9 9 9s9-4 9-9v-2H3v2Z" />
        <path d="M7 6c1 0 1.5.5 2.5.5s1.5-.5 2.5-.5 1.5.5 2.5.5 1.5-.5 2.5-.5" />
      </svg>
    );

    const MilkIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M6 18h12V8H6v10Z" />
        <path d="M18 8l-3-5H9L6 8" />
        <rect x="9" y="10" width="6" height="5" rx="1" />
      </svg>
    );

    // QR Code Builder (PromptPay)
    const PromptPayQR = ({ amount }) => {
      return (
        <div className="qr-box">
          <img 
            src="qr.jpg" 
            alt="ช่องทางสแกนทำบุญบัญชีวัดคงคา" 
            style={{ width: '220px', height: 'auto', display: 'block', margin: '0 auto 1.25rem', borderRadius: '12px', boxShadow: '0 4px 12px rgba(67, 20, 7, 0.05)' }} 
          />
          <div style={{ color: '#431407', fontSize: '0.85rem', fontWeight: '700' }}>ยอดเงินร่วมบริจาค</div>
          <div className="qr-amount-text" style={{ marginTop: '0.25rem' }}>฿{Number(amount).toLocaleString()}</div>
        </div>
      );
    };

    const Carousel = ({ images }) => {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isHovered, setIsHovered] = useState(false);

      const nextSlide = () => {
        setCurrentIndex((prevIndex) => (prevIndex + 1) % images.length);
      };

      const prevSlide = () => {
        setCurrentIndex((prevIndex) => (prevIndex - 1 + images.length) % images.length);
      };

      useEffect(() => {
        if (isHovered) return;
        const timer = setInterval(nextSlide, 4500); // Autoplay 4.5s
        return () => clearInterval(timer);
      }, [images.length, isHovered]);

      return (
        <div 
          className="carousel-container"
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
        >
          <button className="carousel-arrow prev" onClick={prevSlide} aria-label="Previous Slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          
          <div className="carousel-slide">
            <img src={images[currentIndex]} alt={`ภาพน้องแมววัดคงคา รูปที่ ${currentIndex + 1}`} className="carousel-img" />
            
            {/* Elegant Caption Overlay */}
            <div className="carousel-caption">
              <div className="carousel-caption-text">
                <PawIcon style={{ fill: 'none', color: '#fff', verticalAlign: 'middle', marginRight: '6px' }} />
                <span>ภาพความน่ารักของน้องแมววัดคงคา</span>
              </div>
              <span className="carousel-counter">{currentIndex + 1} / {images.length}</span>
            </div>
          </div>
          
          <button className="carousel-arrow next" onClick={nextSlide} aria-label="Next Slide">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          
          <div className="carousel-dots">
            {images.map((_, index) => (
              <span 
                key={index} 
                className={`carousel-dot ${index === currentIndex ? 'active' : ''}`}
                onClick={() => setCurrentIndex(index)}
              ></span>
            ))}
          </div>

          {/* Glowing Autoplay Progress Bar (resets animation on index change) */}
          <div key={currentIndex} className={`carousel-progress-bar ${!isHovered ? 'animate' : ''}`}></div>
        </div>
      );
    };

    const App = () => {
      const [theme, setTheme] = useState('light');
      
      // Live Donation Tracker State
      const targetAmount = 30000; // Monthly target: 30,000 Baht (approx 60 bags of cat food)
      const [currentAmount, setCurrentAmount] = useState(13250);
      const [totalDonors, setTotalDonors] = useState(114);

      // Virtual Cat State
      const [catReaction, setCatReaction] = useState('กำลังรอขนม... 🐾');
      const [catEmoji, setCatEmoji] = useState('🐈');
      const [isReacting, setIsReacting] = useState(false);

      // Form State
      const [formName, setFormName] = useState('');
      const [formMessage, setFormMessage] = useState('');
      const [selectedAmount, setSelectedAmount] = useState(250);
      const [customAmount, setCustomAmount] = useState('');
      
      // Donation flow step: 'input' -> 'qr' -> 'success'
      const [donationStep, setDonationStep] = useState('input');

      // Cats Gallery List (images downloaded from Google Drive)
      const catsList = ['cat1.jpg', 'cat2.jpg', 'cat3.jpg', 'cat4.jpg', 'cat5.jpg', 'cat6.jpg'];

      // Fetch latest donation stats from Cloudflare KV API
      const fetchDonationStats = () => {
        fetch('/api/donation')
          .then(res => {
            if (!res.ok) throw new Error("API request failed");
            return res.json();
          })
          .then(data => {
            if (data.currentAmount !== undefined && data.totalDonors !== undefined) {
              setCurrentAmount(data.currentAmount);
              setTotalDonors(data.totalDonors);
            }
          })
          .catch(err => console.log("Running in local offline mode. Using local states."));
      };

      // Poll API every 15 seconds to keep stats updated in real-time
      useEffect(() => {
        fetchDonationStats(); // Initial fetch
        const pollInterval = setInterval(fetchDonationStats, 15000);
        return () => clearInterval(pollInterval);
      }, []);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);

      const toggleTheme = () => {
        setTheme(prev => prev === 'dark' ? 'light' : 'dark');
      };

      // Virtual Cat Feed Button Function
      const handleFeedVirtualCat = () => {
        if (isReacting) return;
        setIsReacting(true);
        const reactions = [
          'เหมียวววว~ อร่อยจังเล๊ยยย! 🧡🐾',
          'ง่ำๆๆ... ขอบคุณนะทาสใจดี! 🐟✨',
          'ฟู่ๆ... ง่วงแล้ว นอนก่อนนะเมี๊ยว 💤😺',
          'ปุริ๊งๆ... ส่งหัวใจให้ทาสรัวๆ! 🥰🐾',
          'แง้ววว! ขออีกซองได้มั้ยเมี๊ยว? 😻'
        ];
        const emojis = ['🐈', '😸', '😻', '😽', '🐱'];
        
        const randomIdx = Math.floor(Math.random() * reactions.length);
        setCatReaction(reactions[randomIdx]);
        setCatEmoji(emojis[randomIdx]);
        
        setTimeout(() => {
          setIsReacting(false);
        }, 2000);
      };

      // Select package tier
      const selectTier = (amount) => {
        setSelectedAmount(amount);
        setCustomAmount('');
        document.getElementById('donate-form-section').scrollIntoView({ behavior: 'smooth' });
      };

      // Submit Form (opens QR Screen)
      const handleDonateSubmit = (e) => {
        e.preventDefault();
        const finalAmount = customAmount ? parseFloat(customAmount) : selectedAmount;
        if (finalAmount > 0) {
          setDonationStep('qr');
        }
      };

      // Confirm Payment Simulation
      const handleConfirmPayment = () => {
        const finalAmount = customAmount ? parseFloat(customAmount) : selectedAmount;

        // Post update to Cloudflare Workers KV API
        fetch('/api/donation', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: finalAmount })
        })
        .then(res => {
          if (!res.ok) throw new Error("API post failed");
          return res.json();
        })
        .then(data => {
          if (data.success) {
            setCurrentAmount(data.currentAmount);
            setTotalDonors(data.totalDonors);
          } else {
            // Fallback
            setCurrentAmount(prev => prev + finalAmount);
            setTotalDonors(prev => prev + 1);
          }
          setDonationStep('success');
        })
        .catch(err => {
          console.log("Offline mode post fallback:", err);
          // Fallback local update if API is not running (e.g. running locally via file://)
          setCurrentAmount(prev => prev + finalAmount);
          setTotalDonors(prev => prev + 1);
          setDonationStep('success');
        });

        // Trigger a happy meow reaction from the virtual cat!
        setCatReaction('เหมียววว! ยอดบริจาคเข้าแล้ว ขอบคุณทาสผู้อุปถัมภ์นะเมี๊ยว! 😻🧡🎉');
        setCatEmoji('😻');
      };

      const resetDonationForm = () => {
        setFormName('');
        setFormMessage('');
        setSelectedAmount(250);
        setCustomAmount('');
        setDonationStep('input');
      };

      // Calculate progress details
      const progressPercent = Math.min(((currentAmount / targetAmount) * 100), 100).toFixed(1);
      const foodBagsCount = Math.floor(currentAmount / 500); // 1 bag = 500 Baht
      const foodBagsTarget = Math.floor(targetAmount / 500);

      return (
        <div>
          {/* Header Navigation */}
          <header>
            <div className="nav-container">
              <a href="#home" className="logo">
                <div className="logo-icon-container">
                  <PawIcon style={{ color: 'var(--color-accent)' }} />
                </div>
                วัดคงคาแคทฟู้ด
              </a>
              <nav className="nav-links">
                <a href="#home" className="nav-link">หน้าแรก</a>
                <a href="#tiers" className="nav-link">แพ็คเกจอิ่มท้อง</a>
                <a href="#gallery" className="nav-link">ภาพน้องแมว</a>
                <a href="#donate-form-section" className="nav-link">ร่วมทำบุญ</a>
              </nav>
              <div className="nav-actions">
                <button onClick={toggleTheme} className="theme-btn" aria-label="Toggle Theme">
                  {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
                </button>
                <a href="#donate-form-section" className="btn btn-primary">ทำบุญค่าอาหาร</a>
              </div>
            </div>
          </header>

          <main>
            {/* Ambient Background Glow */}
            <div className="glow-bg">
              <div className="glow-circle glow-circle-1"></div>
              <div className="glow-circle glow-circle-2"></div>
            </div>

            {/* Hero & Live Progress Section */}
            <section id="home" className="hero">
              <div className="hero-content">
                <div className="badge">
                  🐱 ยอดบริจาคเพื่อแมวจรวัดคงคา (ไม่หักค่าใช้จ่าย)
                </div>
                <h1 className="hero-title">ช่วยค่าอาหาร<br />น้องแมวจรวัดคงคา</h1>
                <p className="hero-description">
                  วัดคงคาเป็นที่พึ่งพิงของแมวจรจัดกว่า 150 ชีวิตที่ถูกคนนำมาปล่อยไว้ หลวงพ่อและผู้ดูแลทำหน้าที่ช่วยจัดหาอาหารและยารักษาโรคเท่าที่พอทำได้ แต่ทว่าค่าอาหารเม็ดในแต่ละเดือนนั้นสูงเกินกำลังวัดจะรับไหว จึงขอเชิญชวนทุกท่านมาร่วมป้อนข้าวเด็กๆ ให้อิ่มท้องร่วมกัน
                </p>
                
                <div className="hero-buttons">
                  <a href="#donate-form-section" className="btn btn-primary">
                    ร่วมป้อนข้าวเด็กๆ <PawIcon style={{ marginLeft: '4px' }} />
                  </a>
                  <a href="#tiers" className="btn btn-secondary">ดูรายการของบริจาค</a>
                </div>

                {/* Virtual Cat Play Interaction Box */}
                <div className="cat-play-box">
                  <div className="cat-play-bubble">{catReaction}</div>
                  <div className="cat-play-avatar">{catEmoji}</div>
                  <div className="cat-play-text">
                    <strong>น้องส้ม (แมววัดคงคา):</strong><br />
                    <span>กดป้อนขนมกระตุ้นกำลังใจน้องออนไลน์ได้นะเมี๊ยว!</span>
                  </div>
                  <button onClick={handleFeedVirtualCat} className="cat-play-btn">
                    ป้อนขนมแมวเลีย 🍖
                  </button>
                </div>
              </div>
              
              {/* Interactive Live Progress Tracker */}
              <div className="tracker-box">
                <h3 className="tracker-title">
                  <PawIcon style={{ color: 'var(--color-accent)' }} /> 
                  สถานะกองทุนอาหารประจำเดือนนี้
                </h3>
                
                <div className="stats-row">
                  <div className="stat-item">
                    <div className="stat-label">ยอดบริจาคสะสม</div>
                    <div className="stat-val">฿{currentAmount.toLocaleString()}</div>
                  </div>
                  <div className="stat-item">
                    <div className="stat-label">อาหารเม็ดที่จัดซื้อได้</div>
                    <div className="stat-val">{foodBagsCount} / {foodBagsTarget} กระสอบ</div>
                  </div>
                </div>

                <div className="progress-container">
                  <div className="progress-header">
                    <span>ค่านมและอาหารเปียกที่อิ่มท้องแล้ว</span>
                    <span style={{ color: 'var(--color-accent)', fontWeight: '800' }}>{progressPercent}%</span>
                  </div>
                  <div className="progress-bar-bg">
                    <div className="progress-bar-fill" style={{ width: `${progressPercent}%` }}>
                      <div className="progress-glow-dot"></div>
                    </div>
                  </div>
                </div>

                <div className="goal-desc">
                  <span>เป้าหมายค่าอาหารรายเดือน: <strong>฿{targetAmount.toLocaleString()}</strong></span>
                  <span>ยอดผู้มีจิตเมตตา: <strong>{totalDonors.toLocaleString()} คน</strong></span>
                </div>
              </div>
            </section>

            {/* Donation Packages Tiers */}
            <section id="tiers" style={{ paddingTop: '5rem' }}>
              <div className="section-header">
                <p className="section-subtitle">DONATION TIERS</p>
                <h2 className="section-title">เลือกยอดเงินอุปการะอาหารน้องแมว</h2>
                <p className="section-desc">คุณสามารถเลือกแพ็คเกจช่วยเหลือน้องแมวตามกำลังศรัทธา ทุกยอดทำบุญนำไปจัดซื้ออาหารโดยตรง</p>
              </div>

              <div className="tiers-grid">
                <div className="tier-card">
                  <div>
                    <div className="tier-amount">฿50 <span>/ มื้อเล็ก</span></div>
                    <h3 className="tier-title" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <span style={{ background: 'rgba(249, 115, 22, 0.1)', color: 'var(--color-accent)', width: '40px', height: '40px', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><MilkIcon /></span>
                      มื้ออิ่มประทังหิว
                    </h3>
                    <p className="tier-desc">สนับสนุนค่านมแพะเลี้ยงลูกแมวกำพร้า 1 กล่อง และอาหารเปียกสำหรับแมวป่วยรวม 2 ซอง</p>
                  </div>
                  <button onClick={() => selectTier(50)} className="btn btn-secondary tier-action">เลือกยอดนี้</button>
                </div>

                <div className="tier-card featured">
                  <div>
                    <div className="tier-amount" style={{ color: 'var(--color-success)' }}>฿250 <span>/ มื้อใหญ่</span></div>
                    <h3 className="tier-title" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <span style={{ background: 'rgba(249, 115, 22, 0.1)', color: 'var(--color-accent)', width: '40px', height: '40px', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><FishIcon /></span>
                      อาหารเม็ดครึ่งกระสอบ
                    </h3>
                    <p className="tier-desc">ช่วยค่าอาหารเม็ดสำเร็จรูปคุณภาพดีปริมาณ 7.5 กิโลกรัม เลี้ยงน้องแมวให้อิ่มท้องได้ถึง 1 สัปดาห์เต็ม</p>
                  </div>
                  <button onClick={() => selectTier(250)} className="btn btn-primary tier-action">เลือกยอดนี้</button>
                </div>

                <div className="tier-card">
                  <div>
                    <div className="tier-amount">฿500 <span>/ เต็มกระสอบ</span></div>
                    <h3 className="tier-title" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <span style={{ background: 'rgba(249, 115, 22, 0.1)', color: 'var(--color-accent)', width: '40px', height: '40px', borderRadius: '10px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><BowlIcon /></span>
                      เจ้าภาพอาหาร 1 กระสอบ
                    </h3>
                    <p className="tier-desc">เป็นเจ้าภาพอาหารเม็ดกระสอบใหญ่พิเศษขนาด 15 กิโลกรัม จำนวน 1 กระสอบเต็ม เลี้ยงแมวทั้งวัดได้ 1-2 วัน</p>
                  </div>
                  <button onClick={() => selectTier(500)} className="btn btn-secondary tier-action">เลือกยอดนี้</button>
                </div>
              </div>
            </section>

            {/* Cats Gallery Section */}
            <section id="gallery" style={{ paddingTop: '5rem', paddingBottom: '3rem' }}>
              <div className="section-header">
                <p className="section-subtitle">WAT KHONGKHA CATS</p>
                <h2 className="section-title">ภาพน้องแมววัดคงคา</h2>
                <p className="section-desc">ภาพถ่ายจริงของเหล่าน้องแมวจรจัดในวัดคงคาที่รอการอุปการะค่านมและอาหารจากท่าน</p>
              </div>

              <Carousel images={catsList} />
            </section>

            {/* Donation Form and Payment System Section */}
            <section id="donate-form-section" style={{ paddingTop: '3rem', paddingBottom: '3rem' }}>
              <div style={{ maxWidth: '600px', margin: '0 auto' }}>
                <div className="donation-form-card">
                  {donationStep === 'input' && (
                    <form onSubmit={handleDonateSubmit}>
                      <h3 style={{ fontSize: '1.5rem', marginBottom: '0.5rem', fontWeight: '850' }}>ร่วมป้อนข้าวน้องแมว</h3>
                      <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', marginBottom: '1.5rem' }}>
                        กรอกข้อมูลเพื่อร่วมทำบุญสมทบค่าอาหารสัตว์ยากไร้ของวัดคงคา
                      </p>

                      <div className="form-group">
                        <label className="form-label">เลือกยอดที่บริจาค (บาท)</label>
                        <div className="quick-amounts">
                          {[50, 100, 250, 500].map(amt => (
                            <button
                              key={amt}
                              type="button"
                              className={`amt-btn ${selectedAmount === amt && !customAmount ? 'active' : ''}`}
                              onClick={() => {
                                setSelectedAmount(amt);
                                setCustomAmount('');
                              }}
                            >
                              ฿{amt}
                            </button>
                          ))}
                        </div>
                        
                        <input
                          type="number"
                          className="form-input"
                          placeholder="หรือระบุยอดเงินบริจาคอื่นๆ..."
                          value={customAmount}
                          onChange={(e) => {
                            setCustomAmount(e.target.value);
                            setSelectedAmount(null);
                          }}
                          min="10"
                        />
                      </div>

                      <div className="form-group">
                        <label className="form-label" htmlFor="donorName">ชื่อผู้ร่วมทำบุญ</label>
                        <input
                          type="text"
                          id="donorName"
                          className="form-input"
                          placeholder="เช่น ทาสแมวใจดี / ปล่อยว่างเพื่อไม่แสดงนาม"
                          value={formName}
                          onChange={(e) => setFormName(e.target.value)}
                        />
                      </div>

                      <div className="form-group">
                        <label className="form-label" htmlFor="donorMessage">คำอวยพรหรือข้อความถึงเด็กๆ</label>
                        <textarea
                          id="donorMessage"
                          className="form-input"
                          placeholder="ฝากข้อความถึงน้องแมววัดคงคา... (จำกัด 200 ตัวอักษร)"
                          value={formMessage}
                          onChange={(e) => setFormMessage(e.target.value)}
                          maxLength="200"
                        ></textarea>
                      </div>

                      <button type="submit" className="btn btn-primary" style={{ width: '100%', padding: '0.85rem' }}>
                        บริจาคค่าอาหารผ่าน PromptPay <PawIcon style={{ marginLeft: '4px' }} />
                      </button>
                    </form>
                  )}

                  {donationStep === 'qr' && (
                    <div className="qr-modal">
                      <h3 style={{ fontSize: '1.4rem', fontWeight: '850' }}>สแกนทำบุญค่านมและอาหาร</h3>
                      <p style={{ color: 'var(--text-secondary)', fontSize: '0.85rem' }}>
                        กรุณาเปิดแอปพลิเคชันธนาคารและสแกน QR Code นี้เพื่อทำการโอนเงินบริจาคเข้าบัญชีวัดคงคา
                      </p>

                      <PromptPayQR amount={customAmount ? customAmount : selectedAmount} />

                      <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                        <button
                          type="button"
                          className="btn btn-primary"
                          onClick={handleConfirmPayment}
                          style={{ width: '100%', padding: '0.85rem' }}
                        >
                          ยืนยันว่าโอนเงินเสร็จสิ้นแล้ว
                        </button>
                        <button
                          type="button"
                          className="btn btn-secondary"
                          onClick={() => setDonationStep('input')}
                          style={{ width: '100%', padding: '0.85rem' }}
                        >
                          ย้อนกลับไปแก้ไข
                        </button>
                      </div>
                    </div>
                  )}

                  {donationStep === 'success' && (
                    <div className="success-screen">
                      <div className="success-icon">✓</div>
                      <h3 style={{ fontSize: '1.6rem', color: 'var(--color-success)' }}>ขอบพระคุณในความเมตตาค่ะ!</h3>
                      <p style={{ color: 'var(--text-secondary)', margin: '1rem 0 1.5rem', fontSize: '0.95rem' }}>
                        ยอดทำบุญของท่านได้รับการส่งข้อมูลเรียบร้อยแล้ว ขอบพระคุณทาสแมวผู้มีจิตศรัทธาทุกท่านค่ะ 🙏🧡🐾
                      </p>
                      <button
                        type="button"
                        className="btn btn-secondary"
                        onClick={resetDonationForm}
                        style={{ width: '100%' }}
                      >
                        ทำบุญเพิ่มเติมอีกครั้ง
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </section>
          </main>

          {/* Footer */}
          <footer>
            <div className="footer-container">
              <div>
                <span className="footer-logo">วัดคงคาแคทฟู้ด</span>
                <p style={{ marginTop: '0.5rem', fontSize: '0.85rem' }}>© 2026 โครงการช่วยเหลือแมวจรจัดวัดคงคา ปากเกร็ด นนทบุรี. สงวนลิขสิทธิ์</p>
              </div>
              <div style={{ display: 'flex', gap: '1.5rem' }}>
                <a href="#home">หน้าแรก</a>
                <a href="#tiers">แพ็คเกจ</a>
                <a href="#donors">ทาสแมวใจดี</a>
                <a href="#donate-form-section">ร่วมทำบุญ</a>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
